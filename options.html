<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Options - Concept Video Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --success: #10b981;
      --border: #334155;
    }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background-color: var(--card-bg);
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      width: 100%;
      max-width: 400px;
      border: 1px solid var(--border);
    }
    h1 {
      margin-top: 0;
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    p {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }
    input[type="password"] {
      width: 100%;
      padding: 0.75rem;
      background-color: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.875rem;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus {
      outline: none;
      border-color: var(--primary);
    }
    button {
      width: 100%;
      padding: 0.75rem;
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.875rem;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: var(--primary-hover);
    }
    #status {
      margin-top: 1rem;
      font-size: 0.875rem;
      color: var(--success);
      text-align: center;
      min-height: 1.2rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Settings</h1>
    <p>Enter your Gemini API key to use the Concept Video Finder extension. You can get one from Google AI Studio.</p>
    <div class="form-group">
      <label for="apikey">Gemini API Key</label>
      <input type="password" id="apikey" placeholder="AIzaSy..." spellcheck="false" autocomplete="off">
    </div>
    <div class="form-group">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
        <label for="modelSelect" style="margin: 0;">Gemini Model</label>
        <button id="fetchModelsBtn" style="background:#4b5563; border-radius: 4px; padding: 0.3rem 0.6rem; font-size: 0.75rem; width: auto; margin:0;">Load My Models</button>
      </div>
      <select id="modelSelect" style="width: 100%; padding: 0.75rem; background-color: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; font-family: inherit; font-size: 0.875rem; box-sizing: border-box; margin-bottom: 0.5rem;">
        <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
        <option value="gemini-1.5-flash-latest">Gemini 1.5 Flash Latest</option>
        <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
        <option value="gemini-1.0-pro">Gemini 1.0 Pro</option>
      </select>
    </div>
    <button id="save">Save Settings</button>
    <div id="status"></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
